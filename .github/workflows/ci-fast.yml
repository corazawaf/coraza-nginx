name: CI Fast

# Fast dynamic analysis on every PR/push — kept short so PR feedback stays
# quick. build.yml already does the full compile + prove + go-ftw matrix;
# THIS file adds only the two cheap dynamic gates:
#   fuzz-regression : 120s on the ngx_str_to_char target with the SAME breadth
#                     flags as ci-deep (fuzz/run.sh: value-profile, large
#                     max_len, dict, rss ceiling) — only the duration/parallelism
#                     differ. Self-contained pure C + sanitizers, no libcoraza.
#   sanitizer-lite  : 60s ASan/UBSan soak of the running module under benign +
#                     attack traffic (valgrind/helgrind are deep-only).
# Long discovery (parallel multi-hour fuzz, full memcheck+helgrind soak,
# scanners) lives in ci-deep.yml (monthly cron + workflow_dispatch).

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # renovate: depName=libcoraza packageName=corazawaf/libcoraza datasource=github-releases
  LIBCORAZA_VERSION: v1.4.0
  NGINX_VERSION: "1.30.0"

on:
  push:
    # Stacked numbered branches (NN-*) are where all work lives — this fork
    # never merges to main, so CI must trigger on the stack, not just main.
    branches: [main, master, dev, "[0-9][0-9]-*"]
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz-regression:
    name: Fuzz regression (120s)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 200M
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: ccache cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-cifast-fuzz-${{ github.sha }}
          restore-keys: |
            ccache-cifast-fuzz-

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ccache eatmydata
          echo /usr/lib/ccache >> "$GITHUB_PATH"

      - name: Build fuzz target
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz/fuzz_str_to_char"

      - name: Run fuzzer (120s regression, deep-parity breadth)
        # Same breadth flags as ci-deep (value-profile, large max_len, dict,
        # rss ceiling) via the shared fuzz/run.sh — only the duration differs.
        # jobs=1 keeps PR wall-clock short; ci-deep fans out across all cores.
        run: bash fuzz/run.sh 120 1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-fast-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 14

  sanitizer-lite:
    name: Sanitizer lite (60s soak)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    # ASan+UBSan soak, NOT valgrind. libcoraza is a cgo (Go) shared object;
    # the Go runtime aborts at init under valgrind (probes CPU features /
    # arena mmap valgrind rejects), so nginx never comes up (sub-second death,
    # no error.log). ASan/UBSan instrument the C connector at native speed and
    # tolerate the dlopen'd Go .so. Pure-C paths are also covered by the fuzz
    # job. Full valgrind/helgrind soak (if it ever works for cgo) stays in
    # ci-deep behind USE_VALGRIND/USE_HELGRIND.
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl git libpcre2-dev pkg-config \
            wget zlib1g-dev unzip ccache eatmydata
          echo /usr/lib/ccache >> "$GITHUB_PATH"

      # ccache object cache + Go build cache + nginx source cache — cut rebuild
      # time on every PR (see build.yml for the same pattern).
      - name: ccache cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-cifast-sanitizer-${{ github.sha }}
          restore-keys: |
            ccache-cifast-sanitizer-
      - name: Go build cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: gobuild-cifast-${{ env.LIBCORAZA_VERSION }}
          restore-keys: |
            gobuild-cifast-
      - name: nginx source cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ github.workspace }}/nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: nginx-src-${{ env.NGINX_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ^1.25.x

      - name: Build + install libcoraza
        run: |
          set -euo pipefail
          wget -q "https://github.com/corazawaf/libcoraza/archive/refs/tags/${LIBCORAZA_VERSION}.zip"
          unzip -oq "${LIBCORAZA_VERSION}.zip"
          cd libcoraza-*
          ./build.sh
          ./configure
          eatmydata make -j"$(nproc)"
          sudo eatmydata make install
          sudo ldconfig

      - name: Build ASan/UBSan nginx + coraza module
        run: |
          set -euo pipefail
          test -f "nginx-${NGINX_VERSION}.tar.gz" || \
            wget -q -O "nginx-${NGINX_VERSION}.tar.gz" \
              "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"
          cd "nginx-${NGINX_VERSION}"
          # ASan errors are fatal (real heap bugs / UAF — the point of the
          # soak; -fno-sanitize-recover=address). UBSan is report-only.
          # -fno-sanitize=nonnull-attribute,null: nginx core trips benign
          # nullability UB at init (ngx_pstrdup -> memcpy(dst,NULL,0) in
          # ngx_init_cycle) that would otherwise route through the shared
          # sanitizer die-path and kill nginx before it listens — not our bug,
          # and gcc has no -fsanitize-ignorelist to scope it to our TUs. Real
          # pure-C UB is gated by the fuzz job. -fno-sanitize* are COMPILE-only;
          # the link line takes only -fsanitize=... (SAN_LD).
          SAN_LD="-fsanitize=address,undefined"
          SAN_CC="$SAN_LD -fno-sanitize=nonnull-attribute,null -fno-sanitize-recover=address"
          ./configure \
            --with-compat --with-debug --with-threads \
            --with-http_ssl_module --with-http_v2_module \
            --with-http_realip_module --with-http_auth_request_module \
            --add-dynamic-module="$GITHUB_WORKSPACE" \
            --with-cc-opt="-DNGX_DEBUG_PALLOC=1 -g3 -O0 -fno-omit-frame-pointer -funwind-tables $SAN_CC $(pkg-config --cflags libpcre2-8)" \
            --with-ld-opt="$SAN_LD $(pkg-config --libs libpcre2-8)"
          eatmydata make -j"$(nproc)" modules
          eatmydata make -j"$(nproc)"

      - name: Sanitizer soak (60s @ 4 conc)
        env:
          # No valgrind: soak.sh runs the ASan/UBSan-built nginx directly and
          # fails on any asan* log. The dlopen'd Go libcoraza is uninstrumented;
          # verify_asan_link_order=0 allows ASan to init from the main binary
          # rather than requiring LD_PRELOAD.
          ASAN_OPTIONS: "verify_asan_link_order=0"
          CORAZA_MODULE_SO: ${{ github.workspace }}/nginx-${{ env.NGINX_VERSION }}/objs/ngx_http_coraza_module.so
        run: |
          bash tools/soak.sh \
            "$GITHUB_WORKSPACE/nginx-${NGINX_VERSION}/objs/nginx" 60 4

  config-lint:
    name: Config lint (nginx -t)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    # Cheap syntactic/directive gate: build the module (release flags), load it,
    # and `nginx -t` the SHIPPED coraza.conf snippet (t/ inline configs are
    # exercised by the test suite itself, not linted here).
    # Catches directive-name/arg regressions without a full soak.
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make libpcre2-dev zlib1g-dev libssl-dev ccache eatmydata
          echo /usr/lib/ccache >> "$GITHUB_PATH"

      - name: ccache cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-cifast-configlint-${{ github.sha }}
          restore-keys: |
            ccache-cifast-configlint-
      - name: Go build cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: gobuild-cifast-${{ env.LIBCORAZA_VERSION }}
          restore-keys: |
            gobuild-cifast-
      - name: nginx source cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ github.workspace }}/nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: nginx-src-${{ env.NGINX_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ^1.25.x

      - name: Build libcoraza
        run: |
          set -euo pipefail
          wget -q "https://github.com/corazawaf/libcoraza/archive/refs/tags/${LIBCORAZA_VERSION}.zip"
          unzip -qo "${LIBCORAZA_VERSION}.zip"
          cd libcoraza-*
          ./build.sh && ./configure && eatmydata make && sudo eatmydata make install && sudo ldconfig

      - name: Build module
        run: |
          set -euo pipefail
          test -f "nginx-${NGINX_VERSION}.tar.gz" || \
            wget -q -O "nginx-${NGINX_VERSION}.tar.gz" \
              "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"
          cd "nginx-${NGINX_VERSION}"
          ./configure --with-compat --with-http_ssl_module --with-http_v2_module \
            --add-dynamic-module="$GITHUB_WORKSPACE" >/dev/null
          eatmydata make -j"$(nproc)" modules
          # the nginx -t lint step below needs the actual binary, not just the .so
          eatmydata make -j"$(nproc)"

      - name: nginx -t the shipped coraza.conf
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/nginx-${NGINX_VERSION}/objs/nginx"
          SO="$GITHUB_WORKSPACE/nginx-${NGINX_VERSION}/objs/ngx_http_coraza_module.so"
          PREFIX="$GITHUB_WORKSPACE/_lint"
          mkdir -p "$PREFIX/logs"
          cat > "$PREFIX/nginx.conf" <<EOF
          load_module $SO;
          events { worker_connections 64; }
          error_log $PREFIX/logs/error.log;
          pid $PREFIX/nginx.pid;
          http {
            server {
              listen 8080;
              include $GITHUB_WORKSPACE/coraza.conf;
              location / { return 200; }
            }
          }
          EOF
          "$NGX" -t -p "$PREFIX" -c "$PREFIX/nginx.conf"
