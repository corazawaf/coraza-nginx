# This is a basic workflow to help you get started with Actions
name: Compile module

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "compile"
  compile:
    permissions:
      contents: read

    name: Compile on ${{ matrix.os }} for nginx ${{ matrix.nginx_version }}
    runs-on: ${{ matrix.os }}
    env:
      # renovate: depName=libcoraza packageName=corazawaf/libcoraza datasource=github-releases
      LIBCORAZA_VERSION: v1.4.0
    strategy:
      matrix:
        nginx_version: ['1.24.0']
        # The type of runner that the job will run on
        os: [ubuntu-22.04]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Grab nginx source, from cache if possible, or from web
      - name: Grab nginx-${{ matrix.nginx_version }} cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: cache-nginx
        with:
          path: nginx-${{ matrix.nginx_version }}
          key: nginx-${{ matrix.nginx_version }}
      - name: Download nginx
        if: steps.cache-nginx.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          wget https://nginx.org/download/nginx-${{ matrix.nginx_version }}.tar.gz
          tar -xzvf nginx-${{ matrix.nginx_version }}.tar.gz

      # Grab libcoraza
      - name: Grab libcoraza-${{ env.LIBCORAZA_VERSION }} cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: cache-libcoraza
        with:
          path: libcoraza-*
          key: libcoraza-${{ env.LIBCORAZA_VERSION }}
      - name: Download libcoraza
        if: steps.cache-libcoraza.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          wget https://github.com/corazawaf/libcoraza/archive/refs/tags/${{ env.LIBCORAZA_VERSION }}.zip
          unzip -o ${{ env.LIBCORAZA_VERSION }}.zip

      # Grab prebuilts from apt
      - name: Install dependencies with apt
        run: |
          sudo add-apt-repository universe
          sudo apt-get -qq update
          sudo apt-get -y -qq \
          --fix-missing --no-install-recommends install \
          gcc make

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ^1.25.x

      - name: Configure environment
        run: |
          export LD_LIBRARY_PATH=/usr/local/lib
          export LIBRARY_PATH=/usr/local/lib
          export C_INCLUDE_PATH=/usr/local/include

      # Build libcoraza
      - name: Build libcoraza
        run: |
          cd libcoraza-*
          ./build.sh
          ./configure
          make
          sudo make install
          sudo ldconfig


      - name: Configure compilation of dynamic module
        run: |
          cd ${{ github.workspace }}/nginx-${{ matrix.nginx_version }}
          ./configure \
          --with-compat \
          --add-dynamic-module=${{ github.workspace }}/ \
          --with-cc-opt='-g -O2 -fstack-protector-strong -Wformat -Werror=format-security -Wno-unused-function -fPIC -Wdate-time -D_FORTIFY_SOURCE=2' \
          --with-ld-opt='-Wl,-Bsymbolic-functions -Wl,-z,relro -Wl,-z,now -fPIC' \
          --prefix=/etc/nginx \
          --sbin-path=/usr/sbin/nginx \
          --conf-path=/etc/nginx/nginx.conf \
          --http-log-path=/var/log/nginx/access.log \
          --error-log-path=/var/log/nginx/error.log \
          --lock-path=/var/lock/nginx.lock \
          --pid-path=/run/nginx.pid \
          --modules-path=/usr/lib/nginx/modules \
          --http-client-body-temp-path=/var/cache/nginx/client_temp \
          --http-proxy-temp-path=/var/cache/nginx/proxy_temp \
          --http-fastcgi-temp-path=/var/cache/nginx/fastcgi_temp \
          --http-uwsgi-temp-path=/var/cache/nginx/uwsgi_temp \
          --http-scgi-temp-path=/var/cache/nginx/scgi_temp \
          --with-debug \
          --with-threads \
          --with-http_ssl_module \
          --with-http_realip_module \
          --with-http_auth_request_module \
          --with-http_v2_module \
          --with-http_sub_module

      - name: Compile dynamic module and install nginx
        run: |
          cd ${{ github.workspace }}/nginx-${{ matrix.nginx_version }}
          make modules
          make
          sudo make install

      - name: Run tests
        run: |
          curl -sSL https://github.com/nginx/nginx-tests/archive/refs/heads/master.zip -o nginx-tests.zip
          unzip nginx-tests.zip
          cd nginx-tests-*
          cp ../t/* .
          export TEST_NGINX_BINARY=/usr/sbin/nginx
          export TEST_NGINX_GLOBALS="load_module \"/usr/lib/nginx/modules/ngx_http_coraza_module.so\";"
          prove coraza*.t

      - name: Install go-ftw
        run: |
          # renovate: depName=coreruleset/go-ftw datasource=github-releases
          go install github.com/coreruleset/go-ftw/v2@v2.1.0

      - name: Setup CRS and run go-ftw tests
        run: |
          # Download CRS
          # renovate: depName=coreruleset/coreruleset datasource=github-releases
          CRS_VERSION="4.25.0"
          curl -sSL "https://github.com/coreruleset/coreruleset/archive/refs/tags/v${CRS_VERSION}.tar.gz" -o /tmp/crs.tar.gz
          sudo mkdir -p /opt/coraza/owasp-crs /opt/coraza/config /opt/coraza/config.d /opt/coraza/plugins /opt/coraza/rules /opt/coraza/rules.d /opt/coraza/overrides
          tar xzf /tmp/crs.tar.gz -C /tmp
          sudo cp -r /tmp/coreruleset-${CRS_VERSION}/rules /opt/coraza/owasp-crs/
          sudo cp -r /tmp/coreruleset-${CRS_VERSION}/plugins /opt/coraza/owasp-crs/
          sudo cp /tmp/coreruleset-${CRS_VERSION}/crs-setup.conf.example /opt/coraza/config/crs-setup.conf

          # Create coraza config
          sudo tee /opt/coraza/config/coraza.conf > /dev/null <<'CONF'
          SecRuleEngine On
          SecRequestBodyAccess On
          SecResponseBodyAccess Off
          SecAuditEngine Off
          CONF

          # Create rules include chain
          sudo tee /opt/coraza/config/coraza-rules.conf > /dev/null <<'CONF'
          Include /opt/coraza/config/coraza.conf
          Include /opt/coraza/config.d/*.conf
          Include /opt/coraza/config/crs-setup.conf
          Include /opt/coraza/owasp-crs/plugins/*-config.conf
          Include /opt/coraza/owasp-crs/plugins/*-before.conf
          Include /opt/coraza/owasp-crs/rules/*.conf
          Include /opt/coraza/owasp-crs/plugins/*-after.conf
          Include /opt/coraza/plugins/*-config.conf
          Include /opt/coraza/plugins/*-before.conf
          Include /opt/coraza/plugins/*-after.conf
          Include /opt/coraza/rules/*.conf
          Include /opt/coraza/rules.d/*.conf
          Include /opt/coraza/overrides/*.conf
          CONF

          # Install nginx test config and create directories
          sudo cp tests/ftw/nginx-test.conf /etc/nginx/nginx.conf
          sudo mkdir -p /var/cache/nginx/client_temp /var/log/nginx /tmp/empty
          echo "OK" | sudo tee /tmp/empty/index.html > /dev/null

          # Start nginx and wait for it
          sudo /usr/sbin/nginx
          for i in $(seq 1 10); do
            if [ -f /etc/nginx/logs/nginx.pid ]; then break; fi
            sleep 1
          done

          # Run go-ftw
          cat > /tmp/.ftw.yaml <<'EOF'
          testoverride:
            input:
              dest_addr: "127.0.0.1"
              port: 80
          EOF
          ~/go/bin/go-ftw run --cloud --config /tmp/.ftw.yaml -d tests/ftw/

          # Stop nginx
          sudo /usr/sbin/nginx -s stop

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          # Artifact name
          name: nginx-coraza-module-nginx-${{ matrix.nginx_version }}-${{ matrix.os }}
          # A file, directory or wildcard pattern that describes what to upload
          path: |
            ${{ github.workspace }}/nginx-${{ matrix.nginx_version }}/objs/ngx_http_coraza_module.so
