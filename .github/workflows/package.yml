name: Package and Release

on:
  release:
    types: [published]

permissions: {}

jobs:
  package:
    permissions:
      contents: write   # to upload release assets
      id-token: write   # for cosign OIDC keyless signing

    name: Package for nginx ${{ matrix.nginx_version }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      # renovate: depName=libcoraza packageName=corazawaf/libcoraza datasource=github-releases
      LIBCORAZA_VERSION: v1.4.0
      # sha256 of nginx-1.30.3.tar.gz from nginx.org — update together with the matrix
      NGINX_SHA256: "e5823dc6f45610993def93ebf6cfce68264af4958c77e874b7d20f3709001b8f"
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    strategy:
      matrix:
        nginx_version: ['1.30.3']
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
            deb_arch: amd64
            rpm_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            rpm_arch: aarch64

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Grab nginx source, from cache if possible, or from web
      - name: Grab nginx-${{ matrix.nginx_version }} cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-nginx
        with:
          path: nginx-${{ matrix.nginx_version }}
          key: nginx-${{ matrix.nginx_version }}
      - name: Download nginx
        if: steps.cache-nginx.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          wget https://nginx.org/download/nginx-${{ matrix.nginx_version }}.tar.gz
          echo "${NGINX_SHA256}  nginx-${{ matrix.nginx_version }}.tar.gz" | sha256sum -c -
          tar -xzvf nginx-${{ matrix.nginx_version }}.tar.gz

      # Grab libcoraza
      - name: Grab libcoraza-${{ env.LIBCORAZA_VERSION }} cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-libcoraza
        with:
          path: libcoraza-*
          key: libcoraza-${{ env.LIBCORAZA_VERSION }}
      - name: Download libcoraza
        if: steps.cache-libcoraza.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          wget https://github.com/corazawaf/libcoraza/archive/refs/tags/${{ env.LIBCORAZA_VERSION }}.zip
          unzip -o ${{ env.LIBCORAZA_VERSION }}.zip

      # NB: no ccache / Go build-cache restore in this job. It runs only on
      # release:published with contents:write + id-token:write and emits
      # cosign-signed artifacts. Restoring a build cache that a lower-trust PR
      # run could have poisoned would let attacker-controlled objects be
      # compiled/linked into a signed release (zizmor cache-poisoning). Build
      # caches live in the ci-*/build workflows only; the release build is cold.

      - name: Install build dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get -qq update
          sudo apt-get -y -qq \
          --fix-missing --no-install-recommends install \
          gcc make ruby ruby-dev rubygems build-essential ccache eatmydata
          echo /usr/lib/ccache >> "$GITHUB_PATH"
          sudo gem install --no-document fpm

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ^1.25.x
          cache: false   # release job: don't restore a PR-poisonable module cache

      # Build libcoraza
      - name: Build libcoraza
        run: |
          cd libcoraza-*
          ./build.sh
          ./configure
          eatmydata make
          sudo eatmydata make install
          sudo ldconfig

      - name: Configure compilation of dynamic module
        run: |
          cd ${{ github.workspace }}/nginx-${{ matrix.nginx_version }}
          ./configure \
          --with-compat \
          --add-dynamic-module=${{ github.workspace }}/ \
          --with-cc-opt='-g -O2 -fstack-protector-strong -Wformat -Werror=format-security -Wno-unused-function -fPIC -Wdate-time -D_FORTIFY_SOURCE=2' \
          --with-ld-opt='-Wl,-Bsymbolic-functions -Wl,-z,relro -Wl,-z,now -fPIC' \
          --prefix=/etc/nginx \
          --sbin-path=/usr/sbin/nginx \
          --conf-path=/etc/nginx/nginx.conf \
          --http-log-path=/var/log/nginx/access.log \
          --error-log-path=/var/log/nginx/error.log \
          --lock-path=/var/lock/nginx.lock \
          --pid-path=/run/nginx.pid \
          --modules-path=/usr/lib/nginx/modules \
          --http-client-body-temp-path=/var/cache/nginx/client_temp \
          --http-proxy-temp-path=/var/cache/nginx/proxy_temp \
          --http-fastcgi-temp-path=/var/cache/nginx/fastcgi_temp \
          --http-uwsgi-temp-path=/var/cache/nginx/uwsgi_temp \
          --http-scgi-temp-path=/var/cache/nginx/scgi_temp \
          --with-debug \
          --with-threads \
          --with-http_ssl_module \
          --with-http_realip_module \
          --with-http_auth_request_module \
          --with-http_v2_module \
          --with-http_sub_module

      - name: Compile dynamic module
        run: |
          cd ${{ github.workspace }}/nginx-${{ matrix.nginx_version }}
          eatmydata make modules

      - name: Create packages
        run: |
          # Strip leading 'v' from tag (e.g. v1.2.3 -> 1.2.3)
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          # Populate staging directory
          mkdir -p /tmp/pkg/usr/lib/nginx/modules
          mkdir -p /tmp/pkg/usr/local/lib
          cp ${{ github.workspace }}/nginx-${{ matrix.nginx_version }}/objs/ngx_http_coraza_module.so \
             /tmp/pkg/usr/lib/nginx/modules/ngx_http_coraza_module.so
          cp /usr/local/lib/libcoraza.so /tmp/pkg/usr/local/lib/libcoraza.so

          PKGBASE="coraza-nginx_${VERSION}_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}"

          # Create .deb (Debian/Ubuntu)
          fpm -s dir -t deb \
            -n coraza-nginx \
            -v "${VERSION}" \
            --description "Coraza WAF nginx dynamic module" \
            --url "https://github.com/corazawaf/coraza-nginx" \
            --license "Apache-2.0" \
            --architecture ${{ matrix.deb_arch }} \
            --maintainer "Coraza <security@coraza.io>" \
            --vendor "Coraza" \
            -C /tmp/pkg \
            --package "${PKGBASE}.deb" \
            .

          # Create .rpm (RHEL/CentOS/Rocky Linux/Fedora)
          fpm -s dir -t rpm \
            -n coraza-nginx \
            -v "${VERSION}" \
            --description "Coraza WAF nginx dynamic module" \
            --url "https://github.com/corazawaf/coraza-nginx" \
            --license "Apache-2.0" \
            --architecture ${{ matrix.rpm_arch }} \
            --maintainer "Coraza <security@coraza.io>" \
            --vendor "Coraza" \
            -C /tmp/pkg \
            --package "${PKGBASE}.rpm" \
            .

          # Move packages to workspace for later steps
          mv "${PKGBASE}.deb" "${{ github.workspace }}/"
          mv "${PKGBASE}.rpm" "${{ github.workspace }}/"

      - name: Upload packages as artifacts for install tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-nginx${{ matrix.nginx_version }}-${{ matrix.arch }}
          path: |
            ${{ github.workspace }}/coraza-nginx_*_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}.deb
            ${{ github.workspace }}/coraza-nginx_*_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}.rpm
          retention-days: 1

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign packages with cosign (keyless)
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          PKGBASE="coraza-nginx_${VERSION}_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}"

          cosign sign-blob --yes \
            --bundle "${PKGBASE}.deb.bundle" \
            "${PKGBASE}.deb"

          cosign sign-blob --yes \
            --bundle "${PKGBASE}.rpm.bundle" \
            "${PKGBASE}.rpm"

      - name: Upload packages and signatures to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            coraza-nginx_*_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}.deb
            coraza-nginx_*_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}.deb.bundle
            coraza-nginx_*_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}.rpm
            coraza-nginx_*_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}.rpm.bundle

  install-test:
    permissions:
      contents: read
    name: Install test (${{ matrix.pkg_type }}, nginx ${{ matrix.nginx_version }}, ${{ matrix.arch }})
    needs: package
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        nginx_version: ['1.30.3']
        arch: [amd64, arm64]
        pkg_type: [deb, rpm]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages-nginx${{ matrix.nginx_version }}-${{ matrix.arch }}

      - name: Test deb installation
        if: matrix.pkg_type == 'deb'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends nginx
          sudo dpkg -i coraza-nginx_*_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}.deb
          sudo ldconfig
          test -f /usr/lib/nginx/modules/ngx_http_coraza_module.so
          test -f /usr/local/lib/libcoraza.so

      - name: Test rpm installation
        if: matrix.pkg_type == 'rpm'
        run: |
          docker run --rm \
            -v "$PWD:/packages:ro" \
            rockylinux:9 \
            bash -c "
              dnf install -y nginx &&
              rpm -ivh /packages/coraza-nginx_*_nginx${{ matrix.nginx_version }}_${{ matrix.arch }}.rpm &&
              ldconfig &&
              test -f /usr/lib/nginx/modules/ngx_http_coraza_module.so &&
              test -f /usr/local/lib/libcoraza.so
            "
